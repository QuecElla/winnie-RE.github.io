<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>英语口语练习中心</title>
	<style>
		:root {
			--bg-1: #f8f5ef;
			--bg-2: #e3efff;
			--card: #ffffffdd;
			--text: #1f2937;
			--muted: #5f6b7a;
			--line: #d9e2ec;
			--accent: #0f766e;
			--accent-soft: #e7f7f5;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
			background:
				radial-gradient(circle at 10% 10%, #ffffffbb, transparent 35%),
				linear-gradient(160deg, var(--bg-1), var(--bg-2));
			color: var(--text);
			padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
		}

		.wrap {
			width: min(900px, 100%);
			margin: 0 auto;
			background: var(--card);
			border-radius: 20px;
			border: 1px solid #ffffff;
			box-shadow: 0 16px 38px rgba(31, 41, 55, 0.12);
			padding: 22px 18px;
		}

		h1 {
			margin: 0 0 6px;
			font-size: clamp(1.5rem, 2vw + 1rem, 2.2rem);
		}

		p.desc {
			margin: 0 0 18px;
			color: var(--muted);
			line-height: 1.6;
		}

		ul#lesson-list {
			list-style: none;
			padding: 0;
			margin: 0;
			border-top: 1px solid var(--line);
		}

		ul#lesson-list li {
			border-bottom: 1px solid var(--line);
		}

		ul#lesson-list li a,
		ul#lesson-list li span {
			display: block;
			padding: 14px 10px;
			text-decoration: none;
			color: var(--text);
			border-radius: 10px;
		}

		ul#lesson-list li a:hover,
		ul#lesson-list li a:active {
			background: var(--accent-soft);
			color: var(--accent);
		}
	</style>
</head>
<body>
	<main class="wrap">
		<h1>英语口语练习中心</h1>
		<p class="desc">点击课文进入练习页面。最新生成的课文会自动排在最前面。</p>
		<ul id="lesson-list">
      <li><a href="re1-11a/">📘 RE1-11A</a></li>
		</ul>
	</main>
</body>
</html>
